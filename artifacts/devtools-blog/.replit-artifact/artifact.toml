kind = "web"
previewPath = "/"
title = "DevTools & Blog"
version = "1.0.0"
id = "artifacts/devtools-blog"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20775

[services.development]
run = "pnpm --filter @workspace/devtools-blog run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/devtools-blog", "run", "build" ]
publicDir = "artifacts/devtools-blog/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20775"
BASE_PATH = "/"
